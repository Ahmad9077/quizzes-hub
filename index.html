<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quizzes Hub is a friendly homepage for kids to choose their quiz.">
    <title>Quizzes Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="pageTitle">
        <div class="hero-copy">
          <p class="eyebrow">Quizzes Hub</p>
          <h1 id="pageTitle">Pick your quiz and start playing.</h1>
          <p>Choose a name, choose a quiz, and jump straight into practice.</p>
        </div>
        <div class="hero-art" aria-hidden="true">
          <span class="spark spark-one"></span>
          <span class="spark spark-two"></span>
          <span class="spark spark-three"></span>
          <div class="hero-badge">
            <span>ABC</span>
            <strong>123</strong>
          </div>
        </div>
      </section>

      <section class="kids-grid" id="kidsGrid" aria-label="Kids and quizzes"></section>
    </main>

    <template id="kidTemplate">
      <section class="kid-panel">
        <header class="kid-header">
          <div class="avatar" aria-hidden="true"></div>
          <div>
            <p class="section-label">Quizzes for</p>
            <h2></h2>
          </div>
        </header>
        <div class="quiz-list"></div>
      </section>
    </template>

    <template id="quizTemplate">
      <a class="quiz-tile">
        <span class="quiz-icon" aria-hidden="true"></span>
        <span class="quiz-name"></span>
        <span class="start-pill">Start</span>
      </a>
    </template>

    <script src="script.js"></script>
  </body>
</html>
