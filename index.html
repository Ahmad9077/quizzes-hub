<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Private quiz dashboards.">
    <title>Quizzes Hub</title>
    <link rel="stylesheet" href="styles.css?v=15">
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite">
      <section class="loading-screen">
        <p>Loading…</p>
      </section>
    </main>

    <template id="setupTemplate">
      <section class="auth-layout">
        <article class="auth-card setup-card">
          <div>
            <p class="brand">Quizzes Hub</p>
            <h1>Setup required</h1>
          </div>
          <p>Add the Supabase URL and anon key in <code>config.js</code>, then run the SQL and Edge Function in the <code>supabase</code> folder.</p>
          <a class="primary-action" href="README.md">Setup notes</a>
        </article>
      </section>
    </template>

    <template id="loginTemplate">
      <section class="auth-layout">
        <div class="auth-panel">
          <div class="auth-copy">
            <div>
              <p class="brand">Quizzes Hub</p>
              <h1>Play your next quiz.</h1>
              <p class="hero-copy">One bright hub for each child, with quick access to their assigned quizzes.</p>
            </div>
            <div class="trivia-board" aria-hidden="true">
              <span class="trivia-card card-main">
                <b>World</b>
                <i>Flags</i>
              </span>
              <span class="trivia-card card-dark">
                <b>Map</b>
                <i>Quiz</i>
              </span>
              <span class="trivia-card card-yellow">
                <b>Words</b>
                <i>Spell</i>
              </span>
              <span class="trivia-card card-light">
                <b>Read</b>
                <i>Picture</i>
              </span>
            </div>
          </div>
          <form class="auth-card" id="loginForm">
            <div class="form-heading">
              <h2>Sign in</h2>
              <p>Enter the username and password.</p>
            </div>
            <label>
              <span>Username</span>
              <input name="username" autocomplete="username" required>
            </label>
            <label>
              <span>Password</span>
              <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary-action" type="submit">Sign in</button>
            <p class="form-message" id="loginMessage"></p>
          </form>
        </div>
      </section>
    </template>

    <template id="dashboardTemplate">
      <section class="dashboard">
        <header class="topbar">
          <p class="brand">Quizzes Hub</p>
          <div class="topbar-actions">
            <button class="ghost-action" id="adminViewButton" type="button" hidden>Admin</button>
            <button class="ghost-action" id="logoutButton" type="button">Sign out</button>
          </div>
        </header>

        <section class="student-hero">
          <div>
            <p class="student-kicker">Student dashboard</p>
            <h1 id="dashboardTitle" class="page-title"></h1>
          </div>
          <div class="profile-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <nav class="dashboard-tabs" aria-label="Dashboard sections">
            <button class="tab-action active-tab" id="quizzesTabButton" type="button">Quizzes</button>
            <button class="tab-action" id="challengeTabButton" type="button">Challenge</button>
          </nav>
        </section>

        <section id="quizzesPanel">
          <h2 class="section-title">Choose a quiz</h2>
          <div class="quiz-grid" id="assignedQuizGrid"></div>
        </section>

        <section id="challengePanel" hidden>
          <h2 class="section-title">Challenge Mode</h2>
          <div class="challenge-layout">
            <section class="challenge-card">
              <h3>Start a challenge</h3>
              <form id="createChallengeForm" class="challenge-form">
                <label>
                  <span>Quiz</span>
                  <select id="challengeQuizSelect" name="quizId" required></select>
                </label>
                <button class="primary-action" type="submit">Create session</button>
              </form>
              <p class="form-message" id="challengeCreateMessage"></p>
            </section>
          </div>

          <section class="challenge-card" id="activeChallengeCard" hidden>
            <div id="activeChallenge"></div>
          </section>

          <section class="challenge-card">
            <div class="section-heading-row">
              <h3>Open sessions</h3>
              <button class="mini-action" id="refreshChallengesButton" type="button">Refresh</button>
            </div>
            <div class="challenge-list" id="openChallengesList"></div>
          </section>
        </section>
      </section>
    </template>

    <template id="quizTileTemplate">
      <a class="quiz-tile">
        <span class="quiz-icon" aria-hidden="true"></span>
        <span class="quiz-name"></span>
        <span class="start-pill">Start</span>
      </a>
    </template>

    <template id="adminTemplate">
      <section class="dashboard admin-dashboard">
        <header class="topbar">
          <p class="brand">Quizzes Hub</p>
          <div class="topbar-actions">
            <button class="ghost-action" id="backToDashboardButton" type="button">Dashboard</button>
            <button class="ghost-action" id="adminLogoutButton" type="button">Sign out</button>
          </div>
        </header>

        <h1 class="page-title">Admin</h1>

        <section class="admin-grid">
          <form class="admin-card" id="createUserForm">
            <h2>New user</h2>
            <label>
              <span>Username</span>
              <input name="username" required>
            </label>
            <label>
              <span>Display name</span>
              <input name="displayName" required>
            </label>
            <label>
              <span>Password</span>
              <input name="password" type="password" required>
            </label>
            <label>
              <span>Role</span>
              <select name="role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </label>
            <fieldset id="newUserAssignments">
              <legend>Quiz access</legend>
            </fieldset>
            <button class="primary-action" type="submit">Create user</button>
            <p class="form-message" id="createUserMessage"></p>
          </form>

          <section class="admin-card users-card">
            <h2>Users</h2>
            <div id="adminUsersList" class="admin-users-list"></div>
          </section>
        </section>

        <section class="admin-card activity-card">
          <h2>Activity</h2>
          <div id="adminActivityList" class="activity-list"></div>
        </section>
      </section>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js?v=4"></script>
    <script src="script.js?v=22"></script>
  </body>
</html>
